name: waffle_db
description: "An advanced, high performance local vector database for Flutter, powered by Rust and HNSW graph indexing."
version: 0.0.1

repository: https://github.com/MostafaSensei106/Waffle-DB
license: GPL-version 3.0

topics:

- ffi
- vector
- ai
- databas
- rust

funding:
- https://github.com/sponsors/MostafaSensei106
- https://buymeacoffee.com/7yz1lqkegy
- https://ipn.eg/S/mostafasensei106/instapay/0dlUfz

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter_rust_bridge: ^2.12.0

dev_dependencies:
  ffi: ^2.1.3
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
